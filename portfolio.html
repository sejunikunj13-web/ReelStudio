<!DOCTYPE html>
<html lang="en">

    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass-nav { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px); }
        /* Hide default video controls until hover if you want a clean look */
        video::-webkit-media-controls { opacity: 0; transition: opacity 0.3s; }

<body>
    <nav class="fixed w-full z-50 p-6 flex justify-between items-center glass-nav border-b border-white/10 uppercase font-bold text-[10px] tracking-widest">

            <img src="src/assets/images/logo.png" alt="Logo" class="h-8 w-auto object-contain">

 <div data-aos="fade-up" class="group relative aspect-[9/16] bg-zinc-900 rounded-[40px] overflow-hidden border border-white/10">
